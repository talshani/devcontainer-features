name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - mise
          - claude-code-base
        baseImage:
          - debian:latest
          - ubuntu:latest
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - mise
          - claude-code-base
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .

  test-cache-persistence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Write ad-hoc devcontainer.json"
        run: |
          mkdir -p .devcontainer
          cat > .devcontainer/devcontainer.json <<'EOF'
          {
              "image": "mcr.microsoft.com/devcontainers/base:ubuntu",
              "features": { "./src/mise": {} }
          }
          EOF

      - name: "First up — install tool via mise"
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . mise install usage@latest
          devcontainer exec --workspace-folder . mise where usage@latest | tee /tmp/where-before.txt
          grep -q '^/mnt/mise-data/' /tmp/where-before.txt

      - name: "Remove container, keep named volume"
        run: |
          CID=$(docker ps -aq --filter "label=devcontainer.local_folder=$PWD")
          test -n "$CID"
          docker rm -f $CID

      - name: "Second up — verify cached tool persists"
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . mise where usage@latest | tee /tmp/where-after.txt
          diff /tmp/where-before.txt /tmp/where-after.txt
          grep -q '^/mnt/mise-data/' /tmp/where-after.txt
